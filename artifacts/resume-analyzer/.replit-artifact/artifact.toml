kind = "web"
previewPath = "/"
title = "AI Resume Analyzer"
version = "1.0.0"
id = "artifacts/resume-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18646

[services.development]
run = "pnpm --filter @workspace/resume-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-analyzer", "run", "build" ]
publicDir = "artifacts/resume-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18646"
BASE_PATH = "/"
